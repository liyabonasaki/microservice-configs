spring:
  application:
    name: api-gateway

  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    gateway:
      routes:

        # =========================
        # USER SERVICE
        # =========================
        - id: user-service
          uri: lb://user-service

          predicates:
            - Path=/users/**

          filters:

            # 🔁 CLEAN PATH FIRST
            - StripPrefix=1

            # 🚦 RATE LIMITER (NOW PROPERLY BOUND TO BEAN)
            - name: RequestRateLimiter
              args:
                rate-limiter: "#{@redisRateLimiter}"
                key-resolver: "#{@userKeyResolver}"

            # 🔁 RETRY
            - name: Retry
              args:
                retries: 2
                methods: GET
                statuses: INTERNAL_SERVER_ERROR,BAD_GATEWAY

            # ⚡ CIRCUIT BREAKER
            - name: CircuitBreaker
              args:
                name: userServiceCircuitBreaker
                fallbackUri: forward:/fallback/user


        # =========================
        # ORDER SERVICE
        # =========================
        - id: order-service
          uri: lb://order-service

          predicates:
            - Path=/orders/**

          filters:
            - StripPrefix=1

            - name: CircuitBreaker
              args:
                name: orderServiceCircuitBreaker
                fallbackUri: forward:/fallback/order


# =========================
# SERVER
# =========================
server:
  port: 8080


# =========================
# EUREKA
# =========================
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka

  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}


# =========================
# RESILIENCE4J
# =========================
resilience4j:

  circuitbreaker:
    instances:
      userServiceCircuitBreaker:
        slidingWindowSize: 2
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

      orderServiceCircuitBreaker:
        slidingWindowSize: 2
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

  retry:
    instances:
      userServiceRetry:
        maxAttempts: 3
        waitDuration: 500ms


# =========================
# ACTUATOR
# =========================
management:
  endpoints:
    web:
      exposure:
        include: "*"


# =========================
# LOGGING
# =========================
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.gateway.filter.ratelimit: DEBUG
    org.springframework.data.redis: DEBUG